<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的报修单</title>
  <script src="auth.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>table{border-collapse:collapse;width:95%;margin:20px auto}th,td{border:1px solid #ddd;padding:10px;text-align:left}th{background:#f5f5f5}.btn{padding:6px 10px;background:#f56c6c;color:#fff;border:none;border-radius:4px;cursor:pointer}</style>
</head>
<body>
<div id="app">
  <h2 style="text-align:center">我的报修单</h2>
  <table border="1" cellpadding="10" cellspacing="0" width="100%">
    <thead>
    <tr style="background: #f5f5f5;">
      <th>问题描述</th>
      <th>状态</th>
      <th>图片</th>
      <th>操作</th>
    </tr>
    </thead>
    <tbody>
    <tr v-for="item in list" :key="item.id">
      <td>{{ item.problem }}</td>
      <td>{{ item.status }}</td>
      <td>
        <img v-if="item.imagePath" :src="item.imagePath" style="max-width:100px; max-height:100px;" alt="报修图片">
        <span v-else style="color:#999;">无图片</span>
      </td>
      <td>
        <button @click="del(item.id)" style="background:#ff4444; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">
          删除
        </button>
      </td>
    </tr>
    </tbody>
  </table>
</div>
<script>
  const{createApp}=Vue;
  const account=localStorage.getItem("account");

  createApp({
    data(){
      return{list:[]}
    },
    methods:{
      /*async load(){
        // 加载报修单 → 用 request 自动带Token
        const res = await request(`/repair/my-order?account=${account}`);
        //this.list = await res.json();
        const result = await res.json()
        this.list = result.data || result || []
      },*/
      async load(){
        const res = await request(`/repair/my-order?account=${account}`);
        const result = await res.json();
        this.list = result.data || result || [];

        // 关键：打印每条数据的图片路径，确认后端返回了
        this.list.forEach(item => {
          console.log("报修单ID:", item.id, "图片路径:", item.imagePath);
        });
      },
      async del(id){
        if(confirm("确定删除？")){
          const res = await request(`/repair/deleteByStudent?id=${id}&account=${account}`);
          const result = await res.json();
          alert(result.msg);
          this.load();
        }
      }
    },
    mounted(){
      this.load();
    }
  }).mount("#app")
</script>
</body>
</html>
